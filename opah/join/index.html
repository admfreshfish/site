<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Abrindo no Opah…</title>
    <meta name="description" content="Abra o convite do seu evento no app Opah." />
    <meta name="robots" content="noindex,nofollow" />
    <!--
      Shows Safari's "Smart App Banner" when the app is installed. Replace
      YOUR_APPSTORE_ID once Opah has an App Store listing (see
      web_landing/README.md).
    -->
    <meta
      name="apple-itunes-app"
      content="app-id=YOUR_APPSTORE_ID, app-argument=event"
    />
    <style>
      :root {
        --brand: #FFB74D;
        --brand-dark: #E6A23C;
        --bg: #FFFFFF;
        --fg: #212121;
        --muted: #616161;
        --border: #E0E0E0;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      main {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px 48px;
        gap: 18px;
        text-align: center;
      }
      h1 { margin: 0; font-size: 28px; }
      p.subtitle { margin: 0; color: var(--muted); font-size: 15px; }

      .spinner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid var(--border);
        border-top-color: var(--brand);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .install {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        width: 100%;
        max-width: 320px;
      }
      .install p {
        margin: 0 0 4px;
        color: var(--muted);
        font-size: 13px;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--fg);
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
      }
      .btn.primary {
        background: var(--brand);
        color: #000;
        border-color: var(--brand);
      }
      .btn.primary:active { background: var(--brand-dark); }
      .hidden { display: none !important; }

      .event-tag {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
      }
      .event-tag code {
        background: #EEE;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="spinner" aria-hidden="true"></div>
      <h1>Abrindo no Opah…</h1>
      <p class="subtitle">Seu evento está quase lá.</p>

      <div class="install">
        <p>Ainda não tem o app?</p>
        <a id="ios-store" class="btn primary" href="#" target="_blank" rel="noopener">
          Baixar no iPhone
        </a>
        <a id="android-store" class="btn primary" href="#" target="_blank" rel="noopener">
          Baixar no Android
        </a>
        <button id="open-app" class="btn" type="button">
          Tentar abrir o app novamente
        </button>
      </div>

      <p id="event-info" class="event-tag"></p>
    </main>

    <script>
      var params = new URLSearchParams(location.search);
      var eventId = params.get('event') || params.get('id') || '';

      var APP_STORE_URL = 'https://apps.apple.com/app/idYOUR_APPSTORE_ID';
      var PLAY_STORE_URL =
        'https://play.google.com/store/apps/details?id=com.freshfishdigital.opah';

      document.getElementById('ios-store').href = APP_STORE_URL;
      document.getElementById('android-store').href = PLAY_STORE_URL;

      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /Android/.test(ua);

      if (isIOS) document.getElementById('android-store').classList.add('hidden');
      if (isAndroid) document.getElementById('ios-store').classList.add('hidden');
      // On desktop show both store links.

      if (eventId) {
        document.getElementById('event-info').innerHTML =
          'ID do evento: <code>' + escapeHtml(eventId) + '</code>';
      }

      // Manual retry: re-navigate to this URL so Safari re-checks the
      // Universal Link and hands off to the app if installed.
      document
        .getElementById('open-app')
        .addEventListener('click', function () {
          window.location.href = window.location.href;
        });

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
    </script>
  </body>
</html>
