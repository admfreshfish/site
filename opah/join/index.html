<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Entrar no evento · Opah</title>
    <meta
      name="description"
      content="Baixe o Opah para entrar no seu evento."
    />
    <meta name="robots" content="noindex,nofollow" />
    <!--
      Shows Safari's "Smart App Banner" when the app is installed. Replace
      YOUR_APPSTORE_ID once Opah has an App Store listing (see
      web_landing/README.md). Tapping the banner is the ONLY reliable way
      to re-hand off to the app from inside Safari — so keep this meta tag.
    -->
    <meta
      name="apple-itunes-app"
      content="app-id=YOUR_APPSTORE_ID, app-argument=event"
    />
    <style>
      :root {
        --brand: #FFB74D;
        --brand-dark: #E6A23C;
        --bg: #FFFFFF;
        --fg: #212121;
        --muted: #616161;
        --border: #E0E0E0;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      main {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px 56px;
        gap: 14px;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: var(--brand);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 28px;
        color: #000;
        margin-bottom: 8px;
      }
      h1 { margin: 0; font-size: 26px; }
      p.subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        max-width: 320px;
      }

      .cta {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        max-width: 320px;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--fg);
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
      }
      .btn.primary {
        background: var(--brand);
        color: #000;
        border-color: var(--brand);
      }
      .btn.primary:active { background: var(--brand-dark); }
      .hidden { display: none !important; }

      .event-tag {
        margin-top: 18px;
        font-size: 12px;
        color: var(--muted);
      }
      .event-tag code {
        background: #EEE;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
      }

      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">O</div>
      <h1>Entrar no evento</h1>
      <p class="subtitle">
        Baixe o app Opah para ver o convite e participar.
      </p>

      <div class="cta">
        <a id="open-app" class="btn primary hidden" href="#">
          Abrir no app
        </a>
        <a id="ios-store" class="btn" href="#" target="_blank" rel="noopener">
          Baixar no iPhone
        </a>
        <a id="android-store" class="btn" href="#" target="_blank" rel="noopener">
          Baixar no Android
        </a>
      </div>

      <p id="event-info" class="event-tag"></p>
      <p class="footer">Já tem o app? Abra o Opah pelo ícone na tela inicial.</p>
    </main>

    <script>
      var params = new URLSearchParams(location.search);
      var eventId = params.get('event') || params.get('id') || '';

      var APP_STORE_URL = 'https://apps.apple.com/app/idYOUR_APPSTORE_ID';
      var PLAY_STORE_URL =
        'https://play.google.com/store/apps/details?id=com.freshfishdigital.opah';

      document.getElementById('ios-store').href = APP_STORE_URL;
      document.getElementById('android-store').href = PLAY_STORE_URL;

      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /Android/.test(ua);

      if (isIOS) document.getElementById('android-store').classList.add('hidden');
      if (isAndroid) document.getElementById('ios-store').classList.add('hidden');
      // On desktop show both store links.

      // Custom-scheme fallback: when the page is opened inside Safari/Chrome
      // (e.g. iOS Camera also opening Safari in parallel with the Universal
      // Link handoff), a same-domain link/reload won't re-trigger the Universal
      // Link. The opah:// scheme DOES hand off from inside the browser, so we
      // show an "Abrir no app" button on mobile.
      if ((isIOS || isAndroid) && eventId) {
        var openBtn = document.getElementById('open-app');
        openBtn.href = 'opah://join?event=' + encodeURIComponent(eventId);
        openBtn.classList.remove('hidden');
      }

      if (eventId) {
        document.getElementById('event-info').innerHTML =
          'ID do evento: <code>' + escapeHtml(eventId) + '</code>';
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
    </script>
  </body>
</html>
